<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accessibility Statement</title>
  <script src="/translations.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #fff; color: #1a1b1f; font-size: 1rem; line-height: 1.6; }
    .page-wrapper { max-width: 780px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }
    .site-header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 2rem; border-bottom: 1px solid #d7e0e5; margin-bottom: 2.5rem; gap: 1rem; }
    .client-logo { max-height: 40px; max-width: 180px; object-fit: contain; }
    .axall-badge { font-size: 0.75rem; color: #1a1b1f; text-align: right; line-height: 1.4; flex-shrink: 0; }
    .axall-badge a { color: #1a1b1f; text-decoration: underline; }
    h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; line-height: 1.25; }
    .subtitle { font-size: 1rem; margin-bottom: 2.5rem; line-height: 1.6; }
    section { margin-bottom: 2.5rem; }
    h2 { font-size: 1.25rem; font-weight: 700; margin: 2.5rem 0 0.6rem; }
    h3.subsection { font-size: 1rem; font-weight: 600; margin: 1.25rem 0 0.5rem; }
    p { margin-bottom: 0.75rem; }
    p:last-child { margin-bottom: 0; }
    ul { padding-left: 1.5rem; margin-bottom: 1rem; }
    li { margin-bottom: 0.35rem; }
    a { color: #1a1b1f; }
    .issuance-grid { display: grid; grid-template-columns: 1fr; gap: 1.5rem; margin-top: 0.75rem; }
    .issuance-block h3 { font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #555; margin-bottom: 0.5rem; }
    .issuance-block address { font-style: normal; font-size: 0.9rem; line-height: 1.6; white-space: pre-line; }
    .certificate-block { background: #fff; border: 1px solid #d7e0e5; border-radius: 4px; padding: 1rem 1.25rem; margin-top: 0.75rem; }
    .certificate-block p { font-size: 0.9rem; margin-bottom: 0.25rem; }
    .certificate-id { font-family: monospace; font-size: 1rem; font-weight: 600; }
    .acr-link-block { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid #d7e0e5; font-size: 0.9rem; }
    #loading, #error { text-align: center; padding: 4rem 1rem; color: #555; }
    #error { color: #7f1d1d; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <div id="loading">Loading…</div>
    <div id="error" class="hidden">This accessibility statement could not be loaded.</div>
    <div id="content" class="hidden">

      <header class="site-header">
        <img id="client-logo" class="client-logo hidden" src="" alt="" />
        <div class="axall-badge" id="axall-badge"></div>
      </header>

      <h1 id="page-title"></h1>
      <div class="subtitle" id="page-subtitle"></div>
      <hr style="border:none;border-top:1px solid #d7e0e5;margin:0 0 2.5rem">

      <section aria-labelledby="usage-heading">
        <h2 id="usage-heading"></h2>
        <div id="usage-text"></div>
      </section>

      <section id="compatibility-section" aria-labelledby="compat-heading" class="hidden">
        <h2 id="compat-heading"></h2>
        <div id="compat-text"></div>
      </section>

      <section aria-labelledby="limitations-heading">
        <h2 id="limitations-heading"></h2>
        <div id="limitations-text"></div>
        <p id="acr-link-note"></p>
      </section>

      <section aria-labelledby="feedback-heading">
        <h2 id="feedback-heading"></h2>
        <p id="feedback-intro"></p>
        <div id="contact-info"></div>
        <p id="feedback-note"></p>
      </section>

      <section aria-labelledby="technical-heading">
        <h2 id="technical-heading"></h2>
        <p id="client-name-commitment"></p>
        <h3 class="subsection" id="compliance-subheading"></h3>
        <p id="compliance-sentence"></p>
        <p id="compliance-acr-note"></p>
      </section>

      <section aria-labelledby="preparation-heading">
        <h2 id="preparation-heading"></h2>
        <p id="preparation-date-sentence"></p>
        <p id="preparation-testing-sentence"></p>
      </section>

      <section aria-labelledby="issuance-heading">
        <h2 id="issuance-heading"></h2>
        <div class="issuance-grid">
          <div class="issuance-block">
            <h3 id="issued-by-label"></h3>
            <address id="issued-by"></address>
          </div>
        </div>
      </section>

      <section aria-labelledby="cert-heading">
        <h2 id="cert-heading"></h2>
        <p id="cert-body"></p>
        <div class="certificate-block">
          <p id="cert-id-label"></p>
          <p class="certificate-id" id="certificate-id"></p>
        </div>
        <p id="cert-registry-link"></p>
      </section>

      <div class="acr-link-block">
        <a href="acr" id="view-acr-link"></a>
      </div>

    </div>
  </div>

  <script>
    function getSlug() {
      const parts = window.location.hostname.split('.');
      if ((parts[0] === 'accessibility' || parts[0] === 'prieinamumas') && parts.length >= 3) {
        return parts.slice(1, -1).join('.');
      }
      return new URLSearchParams(window.location.search).get('slug') || '';
    }

    function getLangFromHost() {
      return window.location.hostname.split('.')[0] === 'prieinamumas' ? 'lt' : 'en';
    }

    function setText(id, val) { const el = document.getElementById(id); if (el) el.textContent = val || ''; }
    function setHtml(id, val) { const el = document.getElementById(id); if (el) el.innerHTML = val || ''; }
    function show(id) { const el = document.getElementById(id); if (el) el.classList.remove('hidden'); }
    function hide(id) { const el = document.getElementById(id); if (el) el.classList.add('hidden'); }

    function formatDate(isoDate, lang) {
      if (!isoDate) return '';
      const locale = lang === 'lt' ? 'lt-LT' : 'en-GB';
      return new Date(isoDate + 'T12:00:00').toLocaleDateString(locale, { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function getDomain(url) {
      if (!url) return '';
      try { return new URL(url.startsWith('http') ? url : 'https://' + url).hostname.replace(/^www\./, ''); }
      catch { return url.replace(/^https?:\/\//, '').replace(/^www\./, '').split('/')[0]; }
    }

    function renderAddress(text) {
      if (!text) return '';
      return text.split('\n').filter(l => l.trim()).map(line => {
        if (/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/.test(line))
          return line.replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, (_, label, url) => `<a href="${url}" target="_blank" rel="noopener">${label}</a>`)
                     .replace(/\[([^\]]+)\]\((mailto:[^)]+)\)/g, (_, label, url) => `<a href="${url}">${label}</a>`);
        if (/^https?:\/\//.test(line.trim())) { const u = line.trim(); return `<a href="${u}" target="_blank" rel="noopener">${u.replace(/^https?:\/\//, '')}</a>`; }
        if (/^www\./.test(line.trim())) { const d = line.trim(); return `<a href="https://${d}" target="_blank" rel="noopener">${d}</a>`; }
        if (/^[\w.+-]+@[\w-]+\.[\w.]+$/.test(line.trim())) { const e = line.trim(); return `<a href="mailto:${e}">${e}</a>`; }
        return line;
      }).join('<br>');
    }

    function renderContactInfo(text) {
      if (!text) return '';
      const lines = text.split('\n');
      let html = '', inList = false;
      const convertInline = line => line
        .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, (_, l, u) => `<a href="${u}" target="_blank" rel="noopener">${l}</a>`)
        .replace(/\[([^\]]+)\]\((mailto:[^)]+)\)/g, (_, l, u) => `<a href="${u}">${l}</a>`)
        .replace(/\*\*(.*?)\*\*/g, '$1')
        .replace(/(?<![/"'>])([\w.+-]+@[\w-]+\.[\w.]+)(?![^<]*<\/a>)/g, e => `<a href="mailto:${e}">${e}</a>`);
      lines.forEach(raw => {
        const line = raw.trim();
        if (!line) { if (inList) { html += '</ul>'; inList = false; } return; }
        if (/^[-*•●]\s+/.test(line)) {
          if (!inList) { html += '<ul>'; inList = true; }
          html += `<li>${convertInline(line.replace(/^[-*•●]\s+/, ''))}</li>`;
        } else {
          if (inList) { html += '</ul>'; inList = false; }
          html += `<p>${convertInline(line)}</p>`;
        }
      });
      if (inList) html += '</ul>';
      return html;
    }

    function renderRichText(text) {
      if (!text || !text.trim()) return '';
      let html = '';
      text.split('\n').forEach(raw => {
        const line = raw.trim();
        if (!line) return;
        if (/^#{1,6}\s+/.test(line)) html += `<h3 style="font-size:1rem;font-weight:600;margin:1rem 0 0.35rem">${line.replace(/^#{1,6}\s+/, '')}</h3>`;
        else if (/^[•●]\s+/.test(line)) html += `<ul style="padding-left:1.25rem;margin-bottom:0.5rem"><li>${line.replace(/^[•●]\s+/, '')}</li></ul>`;
        else html += `<p>${line}</p>`;
      });
      return html;
    }

    // Builds the intro sentence from VPAT product types + product URL + client name
    function buildIntro(d, t, lang) {
      const vpatTypes = d.vpatProductTypes || [];
      const productUrl = d.productUrl || '';
      const clientName = d.clientDetails || '';
      const domain = getDomain(productUrl);
      const href = productUrl.startsWith('http') ? productUrl : `https://${productUrl}`;
      const display = domain ? 'www.' + domain : productUrl;

      // Build list items as DOM elements to avoid HTML escaping issues
      const ul = document.createElement('ul');

      const addLi = (html) => {
        const li = document.createElement('li');
        li.innerHTML = html;
        ul.appendChild(li);
      };

      let added = false;
      vpatTypes.forEach(type => {
        const name = typeof type === 'object' ? (type.name || '') : type;
        const lc = name.toLowerCase();
        if (lc.includes('web') && !lc.includes('non')) {
          addLi(`${t.introWebsite}: <a href="${href}" target="_blank" rel="noopener">${display}</a>`);
          added = true;
        } else if (lc.includes('mobile') || lc.includes('app')) {
          const appName = langField(d.productVersion, d.productVersionLT, lang) || '';
          addLi(`${t.introApp}${appName ? ': ' + appName : ''}`);
          added = true;
        } else if (lc.includes('document')) {
          addLi(t.introDocs);
          added = true;
        }
      });

      // Fallback — no VPAT types or none matched
      if (!added && productUrl) {
        addLi(`${t.introWebsite}: <a href="${href}" target="_blank" rel="noopener">${display}</a>`);
      }

      const wrapper = document.createElement('div');
      const p1 = document.createElement('p');
      p1.textContent = `${t.introAppliesTo} ${clientName}:`;
      const p2 = document.createElement('p');
      p2.textContent = `(${t.introReferredAs} \u201c${t.introCollective}\u201d)`;
      wrapper.appendChild(p1);
      wrapper.appendChild(ul);
      wrapper.appendChild(p2);
      return wrapper.innerHTML;
    }

    async function init() {
      const rawSlug  = getSlug();
      const hostLang = getLangFromHost();
      const slug     = rawSlug ? `${rawSlug}:${hostLang}` : '';
      if (!slug) { showError(); return; }

      let data;
      try {
        const resp = await fetch(`https://proxy.axall.digital/api/statement/${slug}`);
        if (!resp.ok) throw new Error(resp.status);
        data = await resp.json();
      } catch (e) { showError(); return; }

      render(data);
    }

    function showError() { hide('loading'); show('error'); }

    function render(d) {
      hide('loading');
      show('content');

      const lang = d.lang || 'en';
      const t    = initLang(lang);
      const s    = d.settings || {};

      // Resolved bilingual data fields
      const auditTitle    = langField(d.auditTitle,         d.auditTitleLT,         lang);
      const clientName    = d.clientDetails || '';
      const contactTxt    = langField(d.contactInfo,        d.contactInfoLT,        lang);
      const knownLims     = langField(d.knownLimitations,   d.knownLimitationsLT,   lang);
      const plannedFix    = langField(d.plannedFix,         d.plannedFixLT,         lang);
      const testingPeriod = langField(d.testingPeriod,      d.testingPeriodLT,      lang);
      const axallDetails  = langField(s.axallDetailsEN,     s.axallDetailsLT,       lang);
      const usageTxt      = langField(d.productType?.usageEN, d.productType?.usageLT, lang);
      const compatTxt     = langField(d.productType?.compatEN, d.productType?.compatLT, lang);

      // ── Page meta
      document.title = `${t.statementTitle} — ${auditTitle}`;
      setText('page-title', t.statementTitle);

      // ── Badge
      const badgeLabel = lang === 'lt' ? 'Prieinamumą įvertino' : 'Accessibility evaluated by';
      setHtml('axall-badge', `${badgeLabel}<br><a href="https://axall.digital" target="_blank" rel="noopener">AxAll UAB</a>`);

      // ── Logo
      if (d.logoUrl) {
        const logo = document.getElementById('client-logo');
        logo.src = d.logoUrl; logo.alt = `${clientName} logo`; show('client-logo');
      }

      // ── Intro subtitle
      setHtml('page-subtitle', buildIntro(d, t, lang));

      // ── Usage — always use translations.js text, ignore Airtable field
      setText('usage-heading', t.usageHeading);
      const usageParas = t.usageFallback.split('\n').filter(p => p.trim());
      setHtml('usage-text', usageParas.map(p => `<p>${p}</p>`).join(''));

      // ── Compatibility
      if (d.productType?.showCompat && compatTxt) {
        const compatHeading = lang === 'lt' ? 'Suderinamumas su pagalbinėmis technologijomis' : 'Compatibility with assistive technology';
        setText('compat-heading', compatHeading);
        setHtml('compat-text', renderRichText(compatTxt));
        show('compatibility-section');
      }

      // ── Limitations
      setText('limitations-heading', t.limitationsHeading);
      const limHtml = knownLims ? renderRichText(knownLims)
        : `<p>${lang === 'lt' ? 'Dalis šių skaitmeninių paslaugų nėra visiškai prieinamos.' : 'Parts of these digital services are not fully accessible.'}</p>`;
      const fixNote = plannedFix
        ? `<p>${lang === 'lt' ? `Aktyviai dirbame, kad ištaisytume šias problemas. Reikšmingi patobulinimai planuojami ${plannedFix}.` : `We are actively working to address these issues. Significant improvements are planned for ${plannedFix}.`}</p>`
        : `<p>${lang === 'lt' ? 'Aktyviai dirbame, kad ištaisytume šias problemas, ir laukiame jūsų atsiliepimų.' : 'We are actively working to address these issues and welcome your feedback.'}</p>`;
      setHtml('limitations-text', limHtml + fixNote);
      setHtml('acr-link-note', lang === 'lt'
        ? 'Išsamų žinomų problemų ir jų būsenos sąrašą rasite <a href="acr">Prieinamumo atitikties ataskaitoje</a>.'
        : 'For a complete list of known issues and their status, see the <a href="acr">Accessibility Conformance Report</a>.');

      // ── Feedback
      setText('feedback-heading', t.feedbackHeading);
      setText('feedback-intro', t.feedbackIntro);
      setHtml('contact-info', renderContactInfo(contactTxt || ''));
      setHtml('feedback-note', t.feedbackNote);

      // ── Technical
      setText('technical-heading', t.technicalHeading);
      const directive = directiveLabel(d.applicableDirective, lang);
      setText('client-name-commitment', `${clientName} ${t.technicalCommitment} ${directive}.`);
      setText('compliance-subheading', t.complianceSubheading);

      // Compliance sentence — product name + status + EN standard + WCAG
      const productName  = langField(d.productVersion, d.productVersionLT, lang) || auditTitle;
      const statusLabel  = complianceLabel(d.complianceStatus || '', lang);
      const en321Label   = langField(s.en321LabelEN, s.en321LabelLT, lang);
      const en321Url     = s.en321URL || '';
      const wcag21Label  = langField(s.wcag21LabelEN, s.wcag21LabelLT, lang);
      const wcag21Url    = s.wcag21URL || '';
      const isEnStandard = (d.vpat || '').includes('EN 301 549');

      let complianceSentence = `${productName} ${statusLabel}`;
      if (isEnStandard) {
        complianceSentence += ` ${lang === 'lt' ? 'su' : 'with'} <a href="${en321Url}" target="_blank" rel="noopener">${en321Label}</a> ${lang === 'lt' ? 'ir' : 'and'} <a href="${wcag21Url}" target="_blank" rel="noopener">${wcag21Label}</a>.`;
      } else {
        complianceSentence += ` ${lang === 'lt' ? 'su' : 'with'} ${d.vpat || ''}.`;
      }
      setHtml('compliance-sentence', complianceSentence);
      setHtml('compliance-acr-note', t.complianceNote);

      // ── Preparation
      setText('preparation-heading', t.preparationHeading);
      const preparedOn  = formatDate(d.statementDate, lang);
      const reviewedOn  = formatDate(d.lastReviewed, lang);
      const reviewedPart = reviewedOn ? `, ${t.lastReviewedOn} <strong>${reviewedOn}</strong>` : '';
      setHtml('preparation-date-sentence', `${t.preparedOn} <strong>${preparedOn}</strong>${reviewedPart}.`);

      const standard = d.vpat || '';
      setHtml('preparation-testing-sentence',
        `${t.testedIn} <strong>${testingPeriod || '—'}</strong> ${t.testedAgainst} ${standard} ${lang === 'lt' ? 'reikalavimus' : ''}. ${t.testedSample}`
      );

      // ── Issuance
      setText('issuance-heading', t.issuanceHeading);
      setText('issued-by-label', t.issuedBy);
      const issuedByEl = document.getElementById('issued-by');
      if (issuedByEl) issuedByEl.innerHTML = renderAddress(axallDetails) || 'AxAll UAB';

      // ── Certification
      setText('cert-heading', t.certHeading);
      setText('cert-body', t.certBody);
      setText('cert-id-label', t.certIdLabel);
      setText('certificate-id', d.certificateId || '');
      const registryUrl = d.registryUrl || 'https://axall.digital/accessibility-registry';
      setHtml('cert-registry-link', `<a href="${registryUrl}" target="_blank" rel="noopener">${t.certRegistryLink}</a>`);

      // ── ACR link
      setText('view-acr-link', t.viewFullAcr);
    }

    init();
  </script>
</body>
</html>
