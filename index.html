<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accessibility Conformance Report</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      font-size: 1rem;
      color: #1a1b1f;
      margin: 0;
      padding: 0;
      background: #fff;
    }

    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 3rem 2rem;
    }

    .acr-logo {
      max-width: 180px;
      margin-bottom: 2rem;
      display: block;
    }

    .acr-title {
      font-size: 2rem;
      font-weight: 700;
      margin: 0 0 0.25rem;
    }

    .acr-edition {
      font-size: 1.15rem;
      font-weight: 400;
      margin: 0 0 0.2rem;
    }

    .acr-vpat-version {
      font-size: 0.95rem;
      color: #555;
      margin: 0 0 2rem;
    }

    /* FIX 2: intro field labels are now <h2> — style them consistently */
    h2 {
      font-size: 1.25rem;
      font-weight: 700;
      margin: 2rem 0 0.4rem;
    }

    h3.acr-table-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin: 2rem 0 0.5rem;
    }

    h3.section-heading {
      font-size: 1.1rem;
      font-weight: 700;
      margin: 2rem 0 0.25rem;
    }

    h3.section-heading a {
      color: inherit;
    }

    .acr-field-value {
      font-size: 1rem;
      white-space: pre-line;
      margin: 0 0 0.5rem;
      line-height: 1.6;
    }

    .acr-standards-value {
      font-size: 1rem;
      line-height: 2;
      margin: 0 0 0.5rem;
    }

    .acr-standards-value a {
      color: #0057b8;
    }

    .section-note {
      font-size: 0.95rem;
      color: #1a1b1f;
      margin: 0 0 0.75rem;
      line-height: 1.6;
    }

    hr {
      border: none;
      border-top: 1px solid #c3d2e0;
      margin: 2.5rem 0;
    }

    /* Tables */
    .acr-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    .acr-table th {
      background: #1a3a5c;
      color: #fff;
      text-align: left;
      padding: 0.6rem 0.75rem;
      font-weight: 600;
      border: 1px solid #0d2640;
    }

    .acr-table td {
      padding: 0.5rem 0.75rem;
      border: 1px solid #c3d2e0;
      vertical-align: top;
      line-height: 1.5;
    }

    .acr-table tr:nth-child(even) td {
      background: #f5f8fb;
    }

    .acr-table tr:nth-child(odd) td {
      background: #fff;
    }

    /* FIX 8: EN heading rows override zebra striping */
    .acr-table tr.en-heading-row td {
      background: #e8edf2 !important;
      font-style: italic;
      font-weight: 600;
      color: #2a3a4a;
    }

    /* Conformance level colours */
    .acr-conformance-supports   { color: #1a6e35; font-weight: 600; }
    .acr-conformance-partial    { color: #7a4a00; font-weight: 600; }
    .acr-conformance-not        { color: #a01c1c; font-weight: 600; }
    .acr-conformance-na         { color: #555;    font-weight: 600; }

    /* FIX 6b: EN ref text below criterion */
    .acr-en-ref {
      display: block;
      font-size: 0.85rem;
      color: #444;
      margin-top: 0.4rem;
      line-height: 1.5;
    }

    /* Terms / notes */
    .acr-terms ul {
      padding-left: 1.5rem;
      margin: 0.5rem 0 1rem;
    }

    .acr-terms li {
      margin-bottom: 0.35rem;
    }

    .acr-note {
      font-size: 0.95rem;
      margin: 0.6rem 0;
      line-height: 1.6;
    }

    .acr-note a, .section-note a {
      color: #0057b8;
    }

    a { color: #0057b8; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="page">
  <div id="acr-header"><p style="color:#888">Loading report…</p></div>
  <div id="acr-body"></div>
</div>

<script>
(async function () {

  /* ── helpers ─────────────────────────────────── */
  function esc(str) {
    return String(str || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  // REST API (v0) returns singleSelect as plain string, lookup as array.
  // Handle both gracefully.
  function strVal(v) {
    if (!v) return '';
    if (typeof v === 'string') return v;
    if (typeof v === 'object' && v.name) return v.name; // object shape (newer API)
    return String(v);
  }

  function arrStrVal(v) {
    if (!v) return '';
    if (Array.isArray(v)) {
      const first = v[0];
      if (!first) return '';
      if (typeof first === 'object' && first.name) return first.name;
      return String(first);
    }
    return strVal(v);
  }

  /* ── slug from URL ────────────────────────────── */
  // Slug extraction:
  // • Direct Vercel testing  → acr-pages.vercel.app/liesbethdillen  → from pathname
  // • Client custom domain   → accessibility.liesbethdillen.com     → from hostname (parts[1])
  function getSlug() {
    const pathSlug = window.location.pathname.split('/').filter(Boolean)[0];
    if (pathSlug) return pathSlug;
    const parts = window.location.hostname.split('.');
    // accessibility.liesbethdillen.com → ['accessibility','liesbethdillen','com'] → parts[1]
    return parts.length >= 3 ? parts[1] : parts[0];
  }
  const slug = getSlug();

  /* ── fetch ────────────────────────────────────── */
  let auditData = {}, records = [];
  try {
    const [ar, cr] = await Promise.all([
      fetch(`https://proxy.junekarlove.com/api/audit/${slug}`),
      fetch(`https://proxy.junekarlove.com/api/acr/${slug}`)
    ]);
    auditData = await ar.json();
    records   = (await cr.json()).records || [];
  } catch (e) {
    document.getElementById('acr-header').innerHTML = '<p>Error loading report data.</p>';
    return;
  }

  const {
    clientName  = '',
    productName = '',
    reportDate  = '',
    description = '',
    contact     = '',
    evalMethods = '',
    standard    = '',
    vpat        = '',
    legal       = '',
    logoUrl     = ''
  } = auditData;

  const isEN = vpat === 'EN 301 549';

  /* ── Standards table (matches official VPAT format) ─────────── */
  function renderStandards(stdStr) {
    if (!stdStr) return '<span>—</span>';
    const items = stdStr.split(',').map(s => s.trim()).filter(Boolean);
    const rows = [];
    let enAdded = false;

    items.forEach(std => {
      const lc = std.toLowerCase();

      if (lc.includes('en 301 549')) {
        if (enAdded) return;
        enAdded = true;
        rows.push({
          guidelineHtml:
            `<a href="https://www.etsi.org/deliver/etsi_en/301500_301599/301549/03.01.01_60/en_301549v030101p.pdf" target="_blank" rel="noopener">EN 301 549 Accessibility requirements for ICT products and services - V3.1.1 (2019-11)</a>` +
            ` <em>AND</em> ` +
            `<a href="https://www.etsi.org/deliver/etsi_en/301500_301599/301549/03.02.01_60/en_301549v030201p.pdf" target="_blank" rel="noopener">EN 301 549 Accessibility requirements for ICT products and services - V3.2.1 (2021-03)</a>`,
          includedHtml: `(Yes)`,
        });

      } else if (lc.includes('wcag')) {
        const is22   = std.includes('2.2');
        const hasAAA = std.toUpperCase().includes('AAA');
        const hasAA  = std.toUpperCase().includes('AA');
        const name   = is22
          ? 'Web Content Accessibility Guidelines 2.2'
          : 'Web Content Accessibility Guidelines 2.1';
        const url    = is22 ? 'https://www.w3.org/TR/WCAG22/' : 'https://www.w3.org/TR/WCAG21/';
        rows.push({
          guidelineHtml: `<a href="${url}" target="_blank" rel="noopener">${name}</a>`,
          includedHtml:
            `Level A (Yes)<br>` +
            `Level AA (${hasAA ? 'Yes' : 'No'})<br>` +
            `Level AAA (${hasAAA ? 'Yes' : 'No'})`,
        });

      } else {
        rows.push({ guidelineHtml: esc(std), includedHtml: '(Yes)' });
      }
    });

    if (!rows.length) return '<span>—</span>';

    let table = `
    <p>This report covers the degree of conformance for the following accessibility standard/guidelines:</p>
    <table class="acr-table acr-standards-table">
      <thead><tr>
        <th style="width:70%">Standard/Guideline</th>
        <th style="width:30%;text-align:center">Included In Report</th>
      </tr></thead><tbody>`;

    rows.forEach(row => {
      table += `<tr>
        <td>${row.guidelineHtml}</td>
        <td style="text-align:center;vertical-align:middle">${row.includedHtml}</td>
      </tr>`;
    });

    return table + '</tbody></table>';
  }

  /* ── FIX 1+2: header HTML ─────────────────────── */
  // FIX 1: append " Edition" to vpat value
  // FIX 2: product info labels become <h2>
  const headerHtml = `
    ${logoUrl ? `<img class="acr-logo" src="${esc(logoUrl)}" alt="${esc(clientName)} logo" />` : ''}
    <h1 class="acr-title">${esc(clientName) || 'Accessibility Conformance Report'}</h1>
    ${vpat ? `<p class="acr-edition">${esc(vpat)} Edition</p>` : ''}
    <p class="acr-vpat-version">(Based on VPAT® 2.5 Rev)</p>

    <hr/>

    <h2>Name of Product/Version</h2>
    <p class="acr-field-value">${esc(productName) || '—'}</p>

    <h2>Report Date</h2>
    <p class="acr-field-value">${esc(reportDate) || '—'}</p>

    ${description ? `<h2>Product Description</h2><p class="acr-field-value">${esc(description)}</p>` : ''}

    ${contact ? `<h2>Contact Information</h2><p class="acr-field-value">${esc(contact)}</p>` : ''}

    ${evalMethods ? `<h2>Evaluation Methods Used</h2><p class="acr-field-value">${esc(evalMethods)}</p>` : ''}

    <h2>Applicable Standards/Guidelines</h2>
    ${renderStandards(standard)}
  `;

  document.getElementById('acr-header').innerHTML = headerHtml;

  /* ── parse ACR records ────────────────────────── */
  const wcagA  = [];
  const wcagAA = [];
  const enByChapter = {};   // { chapterNum: [row, ...] }

  records.forEach(r => {
    const f = r.fields;

    // Primary field: "LD Website — 1.4.12"
    const primary     = strVal(f['Audit - Criterion ID']);
    const dashIdx     = primary.indexOf('—');
    const criterionId = (dashIdx >= 0 ? primary.slice(dashIdx + 1) : primary).trim();

    const name        = arrStrVal(f['Criterion Name']);
    const level       = arrStrVal(f['Level']);        // "A" or "AA"
    const refUrl      = arrStrVal(f['Official Reference URL']);
    const conformance = strVal(f['Conformance Level']);
    const remarks     = strVal(f['Remarks and Explanations']);
    // FIX 6b fix: use field NAME not field ID
    const enRef       = strVal(f['EN 301 549 Criteria reference']);
    // FIX 7: override wins; fall back to default from Criteria lookup
    const sectionNotes = strVal(f['EN Section Notes Override'])
                      || arrStrVal(f['EN Section Notes (from Criterion)']);

    const row = { criterionId, name, level, refUrl, conformance, remarks, enRef, sectionNotes };

    const firstNum = parseFloat(criterionId);
    if (isNaN(firstNum)) return;

    if (firstNum >= 1 && firstNum < 5) {
      // WCAG criteria 1.x – 4.x
      if (level === 'A')        wcagA.push(row);
      else if (level === 'AA')  wcagAA.push(row);
    } else if (firstNum >= 5 && firstNum <= 13) {
      // EN 301 549 criteria 5.x – 13.x
      const ch = Math.floor(firstNum);
      if (!enByChapter[ch]) enByChapter[ch] = [];
      enByChapter[ch].push(row);
    }
  });

  // Sort numerically
  const numSort = (a, b) => a.criterionId.localeCompare(b.criterionId, undefined, { numeric: true });
  wcagA.sort(numSort);
  wcagAA.sort(numSort);
  Object.values(enByChapter).forEach(arr => arr.sort(numSort));

  /* ── render helpers ───────────────────────────── */
  function conformanceClass(c) {
    if (c === 'Supports')           return 'acr-conformance-supports';
    if (c === 'Partially Supports') return 'acr-conformance-partial';
    if (c === 'Does Not Support')   return 'acr-conformance-not';
    if (c === 'Not Applicable')     return 'acr-conformance-na';
    return '';
  }

  // FIX 6a + 6b: criterion link + EN ref below
  function renderWcagTable(title, rows, showEnRef) {
    if (!rows.length) return '';
    let html = `
    <h3 class="acr-table-title">${title}</h3>
    <table class="acr-table">
      <thead><tr>
        <th style="width:38%">Criteria</th>
        <th style="width:18%">Conformance Level</th>
        <th style="width:44%">Remarks and Explanations</th>
      </tr></thead><tbody>`;

    rows.forEach(row => {
      const cls = conformanceClass(row.conformance);

      // FIX 6a: link on criterion name
      const criterionLink = row.refUrl
        ? `<a href="${esc(row.refUrl)}" target="_blank" rel="noopener"><strong>${esc(row.criterionId)} ${esc(row.name)}</strong></a> (Level ${esc(row.level)})`
        : `<strong>${esc(row.criterionId)} ${esc(row.name)}</strong> (Level ${esc(row.level)})`;

      // FIX 6b: EN ref below (only in EN edition)
      const enRefHtml = (showEnRef && row.enRef)
        ? `<span class="acr-en-ref"><em>Also applies to: EN 301 549 Criteria</em><br>${esc(row.enRef)}</span>`
        : '';

      html += `<tr>
        <td>${criterionLink}${enRefHtml}</td>
        <td class="${cls}">${esc(row.conformance)}</td>
        <td>${esc(row.remarks)}</td>
      </tr>`;
    });

    return html + '</tbody></table>';
  }

  // FIX 8: EN chapter table with heading row detection
  function renderEnChapterTable(rows) {
    if (!rows.length) return '';
    let html = `
    <table class="acr-table">
      <thead><tr>
        <th style="width:38%">Criteria</th>
        <th style="width:18%">Conformance Level</th>
        <th style="width:44%">Remarks and Explanations</th>
      </tr></thead><tbody>`;

    rows.forEach(row => {
      // Detect heading rows by Conformance Level value set explicitly in Airtable
      const isHeading = row.conformance.includes('Heading cell');

      if (isHeading) {
        // FIX 8: render as heading cell
        html += `<tr class="en-heading-row">
          <td><strong><em>${esc(row.criterionId)} ${esc(row.name)}</em></strong></td>
          <td>Heading cell – no response required</td>
          <td>Heading cell – no response required</td>
        </tr>`;
      } else {
        const cls = conformanceClass(row.conformance);
        const criterionLabel = row.refUrl
          ? `<a href="${esc(row.refUrl)}" target="_blank" rel="noopener"><strong>${esc(row.criterionId)} ${esc(row.name)}</strong></a>`
          : `<strong>${esc(row.criterionId)} ${esc(row.name)}</strong>`;

        html += `<tr>
          <td>${criterionLabel}</td>
          <td class="${cls}">${esc(row.conformance)}</td>
          <td>${esc(row.remarks)}</td>
        </tr>`;
      }
    });

    return html + '</tbody></table>';
  }

  /* ── EN chapter metadata ──────────────────────── */
  const EN_PDF = 'https://www.etsi.org/deliver/etsi_en/301500_301599/301549/03.02.01_60/en_301549v030201p.pdf';
  const EN_CHAPTERS = {
    4:  { label: 'Clause 4: Functional Performance Statements',
          note: 'Not Applicable. This chapter is informative and does not contain requirements requiring testing. Each aspect of the product\'s functionality under evaluation is described in detail within the technical requirements tables.' },
    5:  { label: 'Clause 5: Generic Requirements' },
    6:  { label: 'Clause 6: ICT with Two-Way Voice Communication' },
    7:  { label: 'Clause 7: ICT with Video Capabilities' },
    8:  { label: 'Clause 8: Hardware' },
    9:  { label: 'Clause 9: Web' },
    10: { label: 'Clause 10: Non-Web Documents' },
    11: { label: 'Clause 11: Software' },
    12: { label: 'Clause 12: Documentation and Support Services' },
    13: { label: 'Clause 13: ICT Providing Relay or Emergency Service Access' },
  };

  /* ── assemble body ────────────────────────────── */
  let body = '';

  // FIX 4: Terms section with intro text + 3 notes
  body += `
  <hr/>
  <h2>Terms</h2>
  <div class="acr-terms">
    <p>The terms used in the Conformance Level information are defined as follows:</p>
    <ul>
      <li><strong>Supports</strong>: The functionality of the product has at least one method that meets the criterion without known defects or meets with equivalent facilitation.</li>
      <li><strong>Partially Supports</strong>: Some functionality of the product does not meet the criterion.</li>
      <li><strong>Does Not Support</strong>: The majority of product functionality does not meet the criterion.</li>
      <li><strong>Not Applicable</strong>: The criterion is not relevant to the product.</li>
      <li><strong>Not Evaluated</strong>: The product has not been evaluated against the criterion. This can be used only in WCAG 2.0 Level AAA.</li>
    </ul>
    <p class="acr-note"><strong>Note</strong>: In WCAG tables, the conformance level is marked as "Supports" even when the product does not include content covered by the success criterion. This approach aligns with <a href="https://www.w3.org/TR/WCAG20/#conformance-reqs" target="_blank" rel="noopener">WCAG 2.0 Conformance Requirements</a>.</p>
    <p class="acr-note"><strong>Note</strong>: Criteria marked as "Supports" indicate that the product's conformance has been determined through evaluations using the <a href="https://docs.google.com/document/d/18CJrqdVmyEddayMyVPwEBnTAhI2yuDlE/edit#heading=h.vndgi1pz3yrt" target="_blank" rel="noopener">testing methods described above</a>.</p>
    <p class="acr-note"><strong>Note</strong>: In EN 301 549 tables, "Not Applicable" is used in cases where a specific function related to the criterion is not part of the product. For example, if the product is Web, all criteria from Chapter 8: Hardware of EN 301 549 will be marked as "Not Applicable." This aligns with the <a href="https://www.etsi.org/deliver/etsi_en/301500_301599/301549/03.02.01_60/en_301549v030201p.pdf" target="_blank" rel="noopener">EN 301 549 Conformance Requirements</a>.</p>
  </div>
  <hr/>`;

  // FIX 5: complete WCAG note with link
  if (isEN) {
    body += `
    <h2>WCAG 2.x Report</h2>
    <p>Tables 1 and 2 document conformance with the following criteria from EN 301 549:</p>
    <ul>
      <li>Clause 9 — Web</li>
      <li>Clauses 10.1–10.4 of Clause 10 — Non-web documents</li>
      <li>Clauses 11.1–11.4 and 11.8.2 of Clause 11 — Software</li>
      <li>Clauses 12.1.2 and 12.2.4 of Clause 12 — Documentation and support services</li>
    </ul>
    <p class="section-note">Note: When reporting on conformance with the WCAG 2.x Success Criteria, they are scoped for full pages, complete processes, and accessibility-supported ways of using technology as documented in the <a href="https://www.w3.org/TR/WCAG20/#conformance-reqs" target="_blank" rel="noopener">WCAG 2.0 Conformance Requirements</a>.</p>`;
  } else {
    body += `
    <h2>WCAG 2.x Report</h2>
    <p class="section-note">Note: When reporting on conformance with the WCAG 2.x Success Criteria, they are scoped for full pages, complete processes, and accessibility-supported ways of using technology as documented in the <a href="https://www.w3.org/TR/WCAG20/#conformance-reqs" target="_blank" rel="noopener">WCAG 2.0 Conformance Requirements</a>.</p>`;
  }

  body += renderWcagTable('Table 1: Success Criteria, Level A',  wcagA,  isEN);
  body += renderWcagTable('Table 2: Success Criteria, Level AA', wcagAA, isEN);

  // EN 301 549 section
  if (isEN) {
    body += `<hr/><h2>EN 301 549 Report</h2>`;

    for (let ch = 4; ch <= 13; ch++) {
      const meta = EN_CHAPTERS[ch];
      if (!meta) continue;
      const rows = enByChapter[ch] || [];

      // Clause 4: always shown, fixed note
      if (ch === 4) {
        body += `<h3 class="section-heading"><a href="${EN_PDF}" target="_blank" rel="noopener">${meta.label}</a></h3>`;
        body += `<p class="section-note">Notes: ${meta.note}</p>`;
        continue;
      }

      // Clause 9: always shown, reference to WCAG section
      if (ch === 9) {
        body += `<h3 class="section-heading"><a href="${EN_PDF}#page=54" target="_blank" rel="noopener">${meta.label}</a></h3>`;
        body += `<p class="section-note">See WCAG 2.x section above.</p>`;
        continue;
      }

      // Other chapters: only shown if ACR rows exist
      if (!rows.length) continue;

      // FIX 7: chapter note from "EN Section Notes" field on any row in this chapter
      //        only show "Notes:" label if a note actually exists
      const noteRow = rows.find(r => r.sectionNotes);
      const chapterNote = noteRow ? noteRow.sectionNotes : '';

      body += `<h3 class="section-heading"><a href="${EN_PDF}" target="_blank" rel="noopener">${meta.label}</a></h3>`;
      if (chapterNote) {
        body += `<p class="section-note">Notes: ${esc(chapterNote)}</p>`;
      }
      body += renderEnChapterTable(rows);
    }
  }

  // Legal disclaimer
  if (legal) {
    body += `<hr/><h2>Legal Disclaimer</h2><p style="white-space:pre-line">${esc(legal)}</p>`;
  }

  document.getElementById('acr-body').innerHTML = body;

})();
</script>
</body>
</html>
