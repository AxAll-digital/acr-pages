<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accessibility Statement</title>
  <script src="/translations.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #fff;
      color: #1a1b1f;
      font-size: 1rem;
      line-height: 1.6;
    }

    .page-wrapper {
      max-width: 780px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 2rem;
      border-bottom: 1px solid #d7e0e5;
      margin-bottom: 2.5rem;
      gap: 1rem;
    }

    .client-logo {
      max-height: 40px;
      max-width: 180px;
      object-fit: contain;
    }

    .axall-badge {
      font-size: 0.75rem;
      color: #1a1b1f;
      text-align: right;
      line-height: 1.4;
      flex-shrink: 0;
    }

    .axall-badge a {
      color: #1a1b1f;
      text-decoration: underline;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      line-height: 1.25;
    }

    .subtitle {
      font-size: 1rem;
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }

    section { margin-bottom: 2.5rem; }

    h2 {
      font-size: 1.25rem;
      font-weight: 700;
      margin: 2.5rem 0 0.6rem;
    }

    h3.subsection {
      font-size: 1rem;
      font-weight: 600;
      margin: 1.25rem 0 0.5rem;
    }

    p { margin-bottom: 0.75rem; }
    p:last-child { margin-bottom: 0; }

    ul {
      padding-left: 1.5rem;
      margin-bottom: 1rem;
    }

    li { margin-bottom: 0.35rem; }

    a { color: #1a1b1f; }

    .compliance-badge {
      display: inline-block;
      padding: 0.2rem 0.65rem;
      border-radius: 3px;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
    }

    .compliance-badge.partial { background: #fef3c7; color: #78350f; }
    .compliance-badge.full    { background: #dcfce7; color: #14532d; }
    .compliance-badge.none    { background: #fee2e2; color: #7f1d1d; }

    .issuance-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-top: 0.75rem;
    }

    @media (max-width: 520px) {
      .issuance-grid { grid-template-columns: 1fr; }
    }

    .issuance-block h3 {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #555;
      margin-bottom: 0.5rem;
    }

    .issuance-block address {
      font-style: normal;
      font-size: 0.9rem;
      line-height: 1.6;
      white-space: pre-line;
    }

    .certificate-block {
      background: #fff;
      border: 1px solid #d7e0e5;
      border-radius: 4px;
      padding: 1rem 1.25rem;
      margin-top: 0.75rem;
    }

    .certificate-block p {
      font-size: 0.9rem;
      margin-bottom: 0.25rem;
    }

    .certificate-id {
      font-family: monospace;
      font-size: 1rem;
      font-weight: 600;
    }

    .acr-link-block {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid #d7e0e5;
      font-size: 0.9rem;
    }

    #loading, #error {
      text-align: center;
      padding: 4rem 1rem;
      color: #555;
    }

    #error { color: #7f1d1d; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <div id="loading">Loading…</div>
    <div id="error" class="hidden">This accessibility statement could not be loaded.</div>

    <div id="content" class="hidden">

      <header class="site-header">
        <img id="client-logo" class="client-logo hidden" src="" alt="" />
        <div class="axall-badge" id="axall-badge">
          Accessibility evaluated by<br>
          <a href="https://axall.digital" target="_blank" rel="noopener">AxAll UAB</a>
        </div>
      </header>

      <h1 id="page-title">Accessibility Statement</h1>
      <p class="subtitle" id="page-subtitle"></p>

      <hr style="border:none;border-top:1px solid #d7e0e5;margin:0 0 2.5rem">

      <section aria-labelledby="usage-heading">
        <h2 id="usage-heading"></h2>
        <div id="usage-text"></div>
      </section>

      <section id="compatibility-section" aria-labelledby="compat-heading" class="hidden">
        <h2 id="compat-heading"></h2>
        <div id="compat-text"></div>
      </section>

      <section aria-labelledby="limitations-heading">
        <h2 id="limitations-heading"></h2>
        <div id="limitations-text"></div>
        <p id="acr-link-note"></p>
      </section>

      <section aria-labelledby="feedback-heading">
        <h2 id="feedback-heading"></h2>
        <p id="feedback-intro"></p>
        <div id="contact-info"></div>
        <p id="feedback-note"></p>
      </section>

      <section aria-labelledby="technical-heading">
        <h2 id="technical-heading"></h2>
        <p id="client-name-commitment"></p>
        <h3 class="subsection" id="compliance-subheading"></h3>
        <p id="compliance-sentence"></p>
        <p id="compliance-acr-note"></p>
      </section>

      <section aria-labelledby="preparation-heading">
        <h2 id="preparation-heading"></h2>
        <p id="preparation-date-sentence"></p>
        <p id="preparation-testing-sentence"></p>
      </section>

      <section aria-labelledby="issuance-heading">
        <h2 id="issuance-heading"></h2>
        <div class="issuance-grid">
          <div class="issuance-block">
            <h3 id="issued-by-label"></h3>
            <address id="issued-by"></address>
          </div>
          <div class="issuance-block">
            <h3 id="approved-by-label"></h3>
            <address id="approved-by"></address>
          </div>
        </div>
      </section>

      <section aria-labelledby="cert-heading">
        <h2 id="cert-heading"></h2>
        <p id="cert-sentence"></p>
        <div class="certificate-block">
          <p id="cert-id-label"></p>
          <p class="certificate-id" id="certificate-id"></p>
        </div>
      </section>

      <div class="acr-link-block">
        <a href="acr" id="view-acr-link"></a>
      </div>

    </div>
  </div>

  <script>
    function getSlug() {
      const parts = window.location.hostname.split('.');
      if ((parts[0] === 'accessibility' || parts[0] === 'prieinamumas') && parts.length >= 3) {
        return parts.slice(1, -1).join('.');
      }
      return new URLSearchParams(window.location.search).get('slug') || '';
    }

    function getLangFromHost() {
      const parts = window.location.hostname.split('.');
      if (parts[0] === 'prieinamumas') return 'lt';
      return 'en';
    }

    function setText(id, val) {
      const el = document.getElementById(id);
      if (el) el.textContent = val || '';
    }

    function setHtml(id, val) {
      const el = document.getElementById(id);
      if (el) el.innerHTML = val || '';
    }

    function show(id) {
      const el = document.getElementById(id);
      if (el) el.classList.remove('hidden');
    }

    function hide(id) {
      const el = document.getElementById(id);
      if (el) el.classList.add('hidden');
    }

    function formatDate(isoDate, lang) {
      if (!isoDate) return '';
      const locale = lang === 'lt' ? 'lt-LT' : 'en-GB';
      return new Date(isoDate + 'T12:00:00').toLocaleDateString(locale, {
        day: 'numeric', month: 'long', year: 'numeric'
      });
    }

    function renderAddress(text) {
      if (!text) return '';
      return text.split('\n')
        .filter(l => l.trim())
        .map(line => {
          if (/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/.test(line)) {
            return line
              .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,
                (_, label, url) => `<a href="${url}" target="_blank" rel="noopener">${label}</a>`)
              .replace(/\[([^\]]+)\]\((mailto:[^)]+)\)/g,
                (_, label, url) => `<a href="${url}">${label}</a>`);
          }
          if (/\[([^\]]+)\]\((mailto:[^)]+)\)/.test(line)) {
            return line.replace(/\[([^\]]+)\]\((mailto:[^)]+)\)/g,
              (_, label, url) => `<a href="${url}">${label}</a>`);
          }
          if (/^https?:\/\//.test(line.trim())) {
            const url = line.trim();
            return `<a href="${url}" target="_blank" rel="noopener">${url.replace(/^https?:\/\//, '')}</a>`;
          }
          if (/^www\./.test(line.trim())) {
            const domain = line.trim();
            return `<a href="https://${domain}" target="_blank" rel="noopener">${domain}</a>`;
          }
          if (/^[\w.+-]+@[\w-]+\.[\w.]+$/.test(line.trim())) {
            const email = line.trim();
            return `<a href="mailto:${email}">${email}</a>`;
          }
          return line;
        })
        .join('<br>');
    }

    function renderContactInfo(text) {
      if (!text) return '';
      const lines = text.split('\n');
      let html = '';
      let inList = false;
      const convertInline = (line) => {
        return line
          .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,
            (_, label, url) => `<a href="${url}" target="_blank" rel="noopener">${label}</a>`)
          .replace(/\[([^\]]+)\]\((mailto:[^)]+)\)/g,
            (_, label, url) => `<a href="${url}">${label}</a>`)
          .replace(/\*\*(.*?)\*\*/g, '$1')
          .replace(/(?<![/"'>])([\w.+-]+@[\w-]+\.[\w.]+)(?![^<]*<\/a>)/g,
            email => `<a href="mailto:${email}">${email}</a>`);
      };
      lines.forEach(raw => {
        const line = raw.trim();
        if (!line) { if (inList) { html += '</ul>'; inList = false; } return; }
        if (/^[-*•●]\s+/.test(line)) {
          if (!inList) { html += '<ul>'; inList = true; }
          html += `<li>${convertInline(line.replace(/^[-*•●]\s+/, ''))}</li>`;
        } else {
          if (inList) { html += '</ul>'; inList = false; }
          html += `<p>${convertInline(line)}</p>`;
        }
      });
      if (inList) html += '</ul>';
      return html;
    }

    function renderRichText(text) {
      if (!text || !text.trim()) return '';
      const lines = text.split('\n');
      let html = '';
      lines.forEach(raw => {
        const line = raw.trim();
        if (!line) return;
        if (/^#{1,6}\s+/.test(line)) {
          html += `<h3 style="font-size:1rem;font-weight:600;margin:1rem 0 0.35rem">${line.replace(/^#{1,6}\s+/, '')}</h3>`;
        } else if (/^[•●]\s+/.test(line)) {
          html += `<ul style="padding-left:1.25rem;margin-bottom:0.5rem"><li>${line.replace(/^[•●]\s+/, '')}</li></ul>`;
        } else {
          html += `<p>${line}</p>`;
        }
      });
      return html;
    }

    function renderUsageText(text) {
      if (!text) return '';
      let html = text.replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,
        (_, label, url) => `<a href="${url}" target="_blank" rel="noopener">${label}</a>`
      );
      html = html.replace(/\((https?:\/\/[^)]+)\)/g,
        (_, url) => `(<a href="${url}" target="_blank" rel="noopener">${url.replace(/^https?:\/\//, '')}</a>)`
      );
      const paras = html.split(/\n\n+/).filter(p => p.trim());
      return paras.map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
    }

    async function init() {
      const rawSlug  = getSlug();
      const hostLang = getLangFromHost();
      const slug     = rawSlug ? `${rawSlug}:${hostLang}` : '';

      if (!slug) { showError(); return; }

      let data;
      try {
        const resp = await fetch(`https://proxy.axall.digital/api/statement/${slug}`);
        if (!resp.ok) throw new Error(resp.status);
        data = await resp.json();
      } catch (e) {
        showError();
        return;
      }

      render(data);
    }

    function showError() {
      hide('loading');
      show('error');
    }

    function render(d) {
      hide('loading');
      show('content');

      // ── Lang init ──────────────────────────────────────────────────────────
      const lang = d.lang || 'en';
      const t    = initLang(lang); // from translations.js — sets <html lang>

      // ── Resolve bilingual fields ───────────────────────────────────────────
      const auditTitle     = langField(d.auditTitle,         d.auditTitleLT,         lang);
      const productDesc    = langField(d.productDescription, d.productDescriptionLT, lang);
      const contactTxt     = langField(d.contactInfo,        d.contactInfoLT,        lang);
      const knownLims      = langField(d.knownLimitations,   d.knownLimitationsLT,   lang);
      const plannedFix     = langField(d.plannedFix,         d.plannedFixLT,         lang);
      const testingPeriod  = langField(d.testingPeriod,      d.testingPeriodLT,      lang);
      const axallDetails   = langField(d.settings?.axallDetailsEN, d.settings?.axallDetailsLT, lang);
      const usageTxt       = langField(d.productType?.usageEN,     d.productType?.usageLT,     lang);
      const compatTxt      = langField(d.productType?.compatEN,    d.productType?.compatLT,    lang);
      const label          = langField(d.productType?.referredAsEN, d.productType?.referredAsLT, lang) || 'product';
      const labelCap       = label.charAt(0).toUpperCase() + label.slice(1);

      // ── Page meta ──────────────────────────────────────────────────────────
      document.title = `${t.statementTitle} — ${auditTitle}`;
      setText('page-title', t.statementTitle);

      // ── Badge ──────────────────────────────────────────────────────────────
      const badgeLabel = lang === 'lt' ? 'Prieinamumą įvertino' : 'Accessibility evaluated by';
      setHtml('axall-badge', `${badgeLabel}<br><a href="https://axall.digital" target="_blank" rel="noopener">AxAll UAB</a>`);

      // ── Subtitle ───────────────────────────────────────────────────────────
      setHtml('page-subtitle', d.introSentence || '');

      // ── Logo ───────────────────────────────────────────────────────────────
      if (d.logoUrl) {
        const logo = document.getElementById('client-logo');
        logo.src   = d.logoUrl;
        logo.alt   = `${d.clientDetails || ''} logo`;
        show('client-logo');
      }

      // ── Usage section ──────────────────────────────────────────────────────
      setText('usage-heading', `${t.nameOfProduct.split('/')[0]} ${label}`); // "How you should be able to use this website"
      // Reuse a generic heading pattern from the original
      document.getElementById('usage-heading').textContent =
        lang === 'lt'
          ? `Kaip turėtumėte galėti naudotis šiuo (-ia) ${label}`
          : `How you should be able to use this ${label}`;
      setHtml('usage-text', usageTxt
        ? renderUsageText(usageTxt)
        : `<p>${lang === 'lt' ? `Siekiame, kad ši (-is) ${label} būtų prieinama (-as) ir patogi (-us) naudoti visiems, nepriklausomai nuo gebėjimų.` : `We strive to make this ${label} inclusive and easy to use for people of all abilities.`}</p>`
      );

      // ── Compatibility ──────────────────────────────────────────────────────
      if (d.productType?.showCompat && compatTxt) {
        document.getElementById('compat-heading').textContent =
          lang === 'lt' ? 'Suderinamumas su pagalbinėmis technologijomis' : 'Compatibility with assistive technology';
        setHtml('compat-text', renderRichText(compatTxt));
        show('compatibility-section');
      }

      // ── Limitations ────────────────────────────────────────────────────────
      document.getElementById('limitations-heading').textContent =
        lang === 'lt'
          ? `Šio (-ios) ${label} prieinamumo apribojimai`
          : `Limitations of this ${label}'s accessibility`;

      const limHtml = knownLims
        ? renderRichText(knownLims)
        : `<p>${lang === 'lt' ? `Dalis šio (-ios) ${label} nėra visiškai prieinama (-as).` : `Parts of this ${label} are not fully accessible.`}</p>`;
      const fixNote = plannedFix
        ? `<p>${lang === 'lt' ? `Aktyviai dirbame, kad ištaisytume šias problemas. Reikšmingi patobulinimai planuojami ${plannedFix}.` : `We are actively working to address these issues. Significant improvements are planned for ${plannedFix}.`}</p>`
        : `<p>${lang === 'lt' ? 'Aktyviai dirbame, kad ištaisytume šias problemas, ir laukiame jūsų atsiliepimų.' : 'We are actively working to address these issues and welcome your feedback.'}</p>`;
      setHtml('limitations-text', limHtml + fixNote);

      const acrLinkNote = lang === 'lt'
        ? `Išsamų žinomų problemų ir jų būsenos sąrašą rasite <a href="acr">Prieinamumo atitikties ataskaitoje</a>.`
        : `For a complete list of known issues and their status, see the <a href="acr">Accessibility Conformance Report</a>.`;
      setHtml('acr-link-note', acrLinkNote);

      // ── Feedback ───────────────────────────────────────────────────────────
      setText('feedback-heading', t.feedbackHeading);
      document.getElementById('feedback-intro').textContent =
        lang === 'lt'
          ? `Jei šioje (-iame) ${label} kažkas jums sunkiai naudojama (-as), susisiekite su mumis:`
          : `If you find anything on this ${label} difficult to use, please contact us:`;
      setHtml('contact-info', renderContactInfo(contactTxt || ''));

      const feedbackNoteHtml = lang === 'lt'
        ? `Norėdami padėti mums išspręsti jūsų problemą, prašome pateikti informaciją, rekomenduojamą dokumente <a href="https://www.w3.org/WAI/users/inaccessible" target="_blank" rel="noopener">„Kaip susisiekti su organizacijomis dėl neprieinamų svetainių"</a>. Dėkojame už visus konstruktyvius atsiliepimus apie šio (-ios) ${label} prieinamumą.`
        : `To assist us in addressing your issue, we kindly ask you to provide the details recommended in <a href="https://www.w3.org/WAI/users/inaccessible" target="_blank" rel="noopener">"Contacting Organizations about Inaccessible Websites"</a>. We appreciate all constructive feedback on the accessibility of this ${label}.`;
      setHtml('feedback-note', feedbackNoteHtml);

      // ── Technical / compliance ─────────────────────────────────────────────
      document.getElementById('technical-heading').textContent =
        lang === 'lt'
          ? `Techninė informacija apie šio (-ios) ${label} prieinamumą`
          : `Technical information about this ${label}'s accessibility`;

      const directive = d.applicableDirective || 'Directive (EU) 2019/882';
      const directiveLT = directiveLabel(d.applicableDirective, lang);
      document.getElementById('client-name-commitment').textContent =
        lang === 'lt'
          ? `${d.clientDetails || ''} įsipareigoja užtikrinti šio (-ios) ${label} prieinamumą pagal ${directiveLT}.`
          : `${d.clientDetails || ''} is committed to making its ${label} accessible, in accordance with ${directiveLT}.`;

      setText('compliance-subheading', t.complianceStatus);

      const statusRaw   = d.complianceStatus || '';
      const statusLabel = complianceLabel(statusRaw, lang);
      const standard    = d.vpat || 'EN 301 549';

      setHtml('compliance-sentence',
        lang === 'lt'
          ? `Ši (-is) ${label} <strong>${statusLabel}</strong> su ${standard}.`
          : `The ${labelCap} is <strong>${statusLabel}</strong> with ${standard}.`
      );

      const acrNoteHtml = lang === 'lt'
        ? `Atitikties statusas grindžiamas skaitmeninio prieinamumo atitikties vertinimo rezultatais. Išsamią informaciją apie vertinimą, įskaitant jo išvadas, apimtį ir metodus, rasite <a href="acr">Prieinamumo atitikties ataskaitoje</a>.`
        : `The compliance status is based on the results of a digital accessibility conformance evaluation. Detailed information about the evaluation, including its findings, scope, and methods, can be found in the <a href="acr">Accessibility Conformance Report</a>.`;
      setHtml('compliance-acr-note', acrNoteHtml);

      // ── Preparation ────────────────────────────────────────────────────────
      document.getElementById('preparation-heading').textContent =
        lang === 'lt' ? 'Šio pareiškimo parengimas' : 'Preparation of this statement';

      const preparedOn   = formatDate(d.statementDate, lang);
      const reviewedOn   = formatDate(d.lastReviewed, lang);
      const reviewedPart = reviewedOn
        ? (lang === 'lt' ? ` ir paskutinį kartą peržiūrėtas <strong>${reviewedOn}</strong>` : ` and last reviewed on <strong>${reviewedOn}</strong>`)
        : '';
      setHtml('preparation-date-sentence',
        lang === 'lt'
          ? `Šis prieinamumo pareiškimas parengtas <strong>${preparedOn}</strong>${reviewedPart}.`
          : `This accessibility statement was prepared on <strong>${preparedOn}</strong>${reviewedPart}.`
      );
      setHtml('preparation-testing-sentence',
        lang === 'lt'
          ? `Ši (-is) ${label} buvo testuota (-as) <strong>${testingPeriod || '—'}</strong> pagal ${standard}. Vertinimą atliko AxAll UAB.`
          : `The ${label} underwent testing in <strong>${testingPeriod || '—'}</strong> against ${standard}. The evaluation was conducted by AxAll UAB.`
      );

      // ── Issuance ───────────────────────────────────────────────────────────
      document.getElementById('issuance-heading').textContent =
        lang === 'lt' ? 'Oficialus išleidimas ir patvirtinimas' : 'Official issuance and approval';
      setText('issued-by-label',   lang === 'lt' ? 'Išdavė' : 'Issued by');
      setText('approved-by-label', lang === 'lt' ? 'Patvirtino' : 'Approved by');

      const issuedByEl = document.getElementById('issued-by');
      if (issuedByEl) issuedByEl.innerHTML = renderAddress(axallDetails) || 'AxAll UAB';

      const approvedByEl = document.getElementById('approved-by');
      if (approvedByEl) approvedByEl.innerHTML = renderAddress(d.clientDetails) || '';

      // ── Certificate ────────────────────────────────────────────────────────
      setText('cert-heading', lang === 'lt' ? 'Prieinamumo vertinimo sertifikatas' : 'Accessibility evaluation certificate');

      const registryLabel = lang === 'lt' ? 'Axall prieinamumo registre' : 'Axall Accessibility Registry';
      const certSentence = lang === 'lt'
        ? `Ši (-is) ${label} buvo įvertinta (-as) AxAll UAB ir įtraukta (-as) į <a id="registry-link" href="${d.registryUrl || 'https://axall.digital/accessibility-registry'}" target="_blank" rel="noopener">${registryLabel}</a>.`
        : `This ${label} has been evaluated by AxAll UAB and is listed on the <a id="registry-link" href="${d.registryUrl || 'https://axall.digital/accessibility-registry'}" target="_blank" rel="noopener">${registryLabel}</a>.`;
      setHtml('cert-sentence', certSentence);
      setText('cert-id-label', lang === 'lt' ? 'Sertifikato ID' : 'Certificate ID');
      setText('certificate-id', d.certificateId || '');

      // ── ACR link ───────────────────────────────────────────────────────────
      const acrLink = document.getElementById('view-acr-link');
      if (acrLink) {
        acrLink.textContent = lang === 'lt'
          ? 'Peržiūrėti visą prieinamumo atitikties ataskaitą →'
          : 'View the full Accessibility Conformance Report →';
      }
    }

    init();
  </script>
</body>
</html>
