<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accessibility Conformance Report</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    body {
      font-family: Arial, sans-serif;
      font-size: 1rem;
      color: #1a1b1f;
      margin: 0;
      padding: 0;
      background: #fff;
      line-height: 1.6;
    }

    .page {
      max-width: 780px;
      margin: 0 auto;
      padding: 3rem 2rem;
    }

    .acr-logo {
      max-width: 180px;
      margin-bottom: 2rem;
      display: block;
    }

    .acr-title {
      font-size: 2rem;
      font-weight: 700;
      margin: 0 0 0.25rem;
    }

    .acr-edition {
      font-size: 1.15rem;
      font-weight: 400;
      margin: 0 0 0.2rem;
    }

    .acr-vpat-version {
      font-size: 0.95rem;
      color: #555;
      margin: 0 0 2rem;
    }

    h2 {
      font-size: 1.25rem;
      font-weight: 700;
      margin: 2.5rem 0 0.6rem;
    }

    h3.acr-table-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin: 2.5rem 0 0.5rem;
    }

    h3.section-heading {
      font-size: 1.1rem;
      font-weight: 700;
      margin: 2.5rem 0 0.4rem;
    }

    h3.section-heading a {
      color: inherit;
    }

    /* Evaluator / method blocks */
    .eval-block {
      margin-bottom: 1.25rem;
    }

    .eval-block-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin: 2rem 0 0.4rem;
    }

    .eval-block-subtitle {
      font-size: 1rem;
      color: #1a1b1f;
      margin-bottom: 0.35rem;
    }

    .eval-block p {
      font-size: 1rem;
      margin-bottom: 0.4rem;
      line-height: 1.6;
    }

    .eval-block ul {
      margin: 0.25rem 0 0.5rem 1.5rem;
      padding: 0;
      font-size: 1rem;
      line-height: 1.6;
    }

    .eval-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin: 0.4rem 0 1rem;
    }

    .eval-tag {
      background: #f0f4f8;
      border: 1px solid #d0dce8;
      border-radius: 3px;
      padding: 0.15rem 0.5rem;
      font-size: 0.8rem;
      color: #2a3a4a;
    }

    .acr-field-value {
      font-size: 1rem;
      white-space: pre-line;
      margin: 0 0 0.5rem;
      line-height: 1.6;
    }

    .acr-standards-value {
      font-size: 1rem;
      line-height: 2;
      margin: 0 0 0.5rem;
    }

    .acr-standards-value a {
      color: #0057b8;
    }

    .section-note {
      font-size: 0.95rem;
      color: #1a1b1f;
      margin: 0 0 0.75rem;
      line-height: 1.6;
    }

    hr {
      border: none;
      border-top: 1px solid #d7e0e5;
      margin: 2.5rem 0;
    }

    .acr-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
      margin-top: 1rem;
      margin-bottom: 2rem;
    }

    .acr-field-value ol,
    .acr-field-value ul,
    #acr-header ol,
    #acr-header ul {
      margin: 0.5rem 0 0.5rem 1.5rem;
      padding: 0;
      line-height: 1.8;
    }

    .acr-field-value ol li,
    .acr-field-value ul li,
    #acr-header ol li,
    #acr-header ul li {
      margin-bottom: 0.25rem;
    }

    .acr-table caption {
      text-align: left;
      font-size: 1.1rem;
      font-weight: 700;
      padding: 0 0 0.5rem 0;
      color: #1a1b1f;
      caption-side: top;
    }

    .acr-table th {
      background: #1a3a5c;
      color: #fff;
      text-align: left;
      padding: 0.6rem 0.75rem;
      font-weight: 600;
      border: 1px solid #0d2640;
    }

    .acr-table td {
      padding: 0.5rem 0.75rem;
      border: 1px solid #c3d2e0;
      vertical-align: top;
      line-height: 1.5;
    }

    .acr-table tr:nth-child(even) td { background: #f5f8fb; }
    .acr-table tr:nth-child(odd)  td { background: #fff; }

    .acr-table tr.en-heading-row td {
      background: #e8edf2 !important;
      font-style: italic;
      font-weight: 600;
      color: #2a3a4a;
    }

    .acr-conformance-supports { color: #1a6e35; font-weight: 600; }
    .acr-conformance-partial  { color: #7a4a00; font-weight: 600; }
    .acr-conformance-not      { color: #a01c1c; font-weight: 600; }
    .acr-conformance-na       { color: #555;    font-weight: 600; }

    .acr-en-ref {
      display: block;
      font-size: 0.85rem;
      color: #444;
      margin-top: 0.4rem;
      line-height: 1.5;
      font-style: italic;
    }

    .acr-en-ref ul {
      margin: 0.2rem 0 0 1.25rem;
      padding: 0;
      list-style: disc;
      font-style: normal;
    }

    .acr-en-ref ul li { margin-bottom: 0.15rem; }

    .acr-terms ul {
      padding-left: 1.5rem;
      margin: 0.5rem 0 1rem;
    }

    .acr-terms li { margin-bottom: 0.35rem; }

    .acr-note {
      font-size: 0.95rem;
      margin: 0.6rem 0;
      line-height: 1.6;
    }

    .acr-note a, .section-note a { color: #0057b8; }
    a { color: #0057b8; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<main>
<div class="page">
  <div id="acr-header"><p style="color:#888">Loading report…</p></div>
  <div id="acr-body"></div>
</div>
</main>

<script>
(async function () {

  function esc(str) {
    return String(str || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function lookupVal(v) {
    if (!v) return '';
    if (typeof v === 'string') return v;
    if (typeof v === 'object' && v.name) return v.name;
    if (Array.isArray(v)) {
      const first = v[0];
      if (!first) return '';
      return typeof first === 'object' && first.name ? first.name : String(first);
    }
    if (v.linkedRecordIds && v.valuesByLinkedRecordId) {
      const id  = v.linkedRecordIds[0];
      if (!id) return '';
      const vals = v.valuesByLinkedRecordId[id];
      if (!vals || !vals.length) return '';
      const first = vals[0];
      return typeof first === 'object' && first.name ? first.name : String(first);
    }
    return '';
  }

  function getSlug() {
    const parts = window.location.hostname.split('.');
    if (parts[0] === 'accessibility' && parts.length >= 3) return parts[1];
    return new URLSearchParams(window.location.search).get('slug') || '';
  }
  const slug = getSlug();

  let auditData = {}, records = [], scopeRecords = [];
  try {
    const [ar, cr, sr] = await Promise.all([
      fetch(`https://proxy.axall.digital/api/audit/${slug}`),
      fetch(`https://proxy.axall.digital/api/acr/${slug}`),
      fetch(`https://proxy.axall.digital/api/scope/${slug}`)
    ]);
    auditData    = await ar.json();
    records      = (await cr.json()).records || [];
    scopeRecords = (await sr.json()).records || [];
  } catch (e) {
    document.getElementById('acr-header').innerHTML = '<p>Error loading report data.</p>';
    return;
  }

  const {
    clientName            = '',
    auditTitle            = '',
    productName           = '',
    reportDate            = '',
    description           = '',
    axallContact          = '',
    leadEvaluator         = null,
    disabilityReviewer    = null,
    methodRecords         = [],
    assistiveTechnologies = [],
    automatedTools        = [],
    standard              = '',
    vpat                  = '',
    legal                 = '',
    logoUrl               = ''
  } = auditData;

  const isEN = vpat === 'EN 301 549';

  /* ── Standards table ─────────────────────────── */
  function renderStandards(stdStr) {
    if (!stdStr) return '<span>—</span>';
    const items = stdStr.split(',').map(s => s.trim()).filter(Boolean);
    const rows = [];
    let enAdded = false;

    const hasEN     = items.some(s => s.toLowerCase().includes('en 301 549'));
    const hasWcag20 = items.some(s => s.toLowerCase().includes('wcag 2.0'));
    const hasWcag21 = items.some(s => s.toLowerCase().includes('wcag 2.1'));
    if (hasEN) {
      if (!hasWcag21) items.unshift('WCAG 2.1 AA');
      if (!hasWcag20) items.unshift('WCAG 2.0 AA');
    }

    items.forEach(std => {
      const lc = std.toLowerCase();
      if (lc.includes('en 301 549')) {
        if (enAdded) return;
        enAdded = true;
        rows.push({
          guidelineHtml:
            `<a href="https://www.etsi.org/deliver/etsi_en/301500_301599/301549/03.01.01_60/en_301549v030101p.pdf" target="_blank" rel="noopener">EN 301 549 Accessibility requirements for ICT products and services - V3.1.1 (2019-11)</a>` +
            ` <em>AND</em> ` +
            `<a href="https://www.etsi.org/deliver/etsi_en/301500_301599/301549/03.02.01_60/en_301549v030201p.pdf" target="_blank" rel="noopener">EN 301 549 Accessibility requirements for ICT products and services - V3.2.1 (2021-03)</a>`,
          includedHtml: `(Yes)`,
        });
      } else if (lc.includes('wcag')) {
        const is20 = std.includes('2.0');
        const is22 = std.includes('2.2');
        const hasAAA = std.toUpperCase().includes('AAA');
        const hasAA  = std.toUpperCase().includes('AA');
        const name = is22 ? 'Web Content Accessibility Guidelines 2.2'
                   : is20 ? 'Web Content Accessibility Guidelines 2.0'
                   :        'Web Content Accessibility Guidelines 2.1';
        const url  = is22 ? 'https://www.w3.org/TR/WCAG22/'
                   : is20 ? 'http://www.w3.org/TR/2008/REC-WCAG20-20081211'
                   :        'https://www.w3.org/TR/WCAG21/';
        rows.push({
          guidelineHtml: `<a href="${url}" target="_blank" rel="noopener">${name}</a>`,
          includedHtml:  `Level A (Yes)<br>Level AA (${hasAA ? 'Yes' : 'No'})<br>Level AAA (${hasAAA ? 'Yes' : 'No'})`,
        });
      } else {
        rows.push({ guidelineHtml: esc(std), includedHtml: '(Yes)' });
      }
    });

    if (!rows.length) return '<span>—</span>';

    let table = `
    <p>This report covers the degree of conformance for the following accessibility standard/guidelines:</p>
    <table class="acr-table acr-standards-table">
      <caption class="sr-only">Applicable Standards and Guidelines</caption>
      <thead><tr>
        <th style="width:70%">Standard/Guideline</th>
        <th style="width:30%;text-align:center">Included In Report</th>
      </tr></thead><tbody>`;
    rows.forEach(row => {
      table += `<tr><td>${row.guidelineHtml}</td><td style="text-align:center;vertical-align:middle">${row.includedHtml}</td></tr>`;
    });
    return table + '</tbody></table>';
  }

  /* ── Formatted text renderer ─────────────────── */
  function renderFormattedText(text) {
    if (!text || !text.trim()) return '';
    const lines = text.split('\n');
    let html = '';
    let ulOpen = false, olOpen = false, liOpen = false, subUlOpen = false;
    const closeSubList = () => { if (subUlOpen) { html += '</ul>'; subUlOpen = false; } };
    const closeLi      = () => { if (liOpen) { closeSubList(); html += '</li>'; liOpen = false; } };
    const closeList    = () => {
      if (ulOpen) { closeLi(); html += '</ul>'; ulOpen = false; }
      if (olOpen) { closeLi(); html += '</ol>'; olOpen = false; }
    };
    for (const raw of lines) {
      const line = raw.trim();
      if (!line) continue;
      const isBullet   = /^[•●]/.test(line);
      const isNumbered = /^\d+\.\s/.test(line);
      const isSub      = /^[-–]/.test(line);
      if (isBullet) {
        if (olOpen) { closeLi(); html += '</ol>'; olOpen = false; }
        if (!ulOpen) { html += '<ul>'; ulOpen = true; } else closeLi();
        html  += `<li>${esc(line.replace(/^[•●]\s*/, ''))}`;
        liOpen = true;
      } else if (isNumbered) {
        if (ulOpen) { closeLi(); html += '</ul>'; ulOpen = false; }
        if (!olOpen) { html += '<ol>'; olOpen = true; } else closeLi();
        html  += `<li>${esc(line.replace(/^\d+\.\s*/, ''))}`;
        liOpen = true;
      } else if (isSub) {
        if (ulOpen || olOpen) {
          if (!subUlOpen) { html += '<ul>'; subUlOpen = true; }
          html += `<li>${esc(line.replace(/^[-–]\s*/, ''))}</li>`;
        } else {
          if (!ulOpen) { html += '<ul>'; ulOpen = true; } else closeLi();
          html += `<li>${esc(line.replace(/^[-–]\s*/, ''))}</li>`;
        }
      } else {
        closeList();
        html += `<p class="acr-field-value">${esc(line)}</p>`;
      }
    }
    closeList();
    return html || `<p class="acr-field-value">${esc(text)}</p>`;
  }

  /* ── Evaluation Scope renderer ───────────────── */
  function renderEvalScope(recs) {
    if (!recs || !recs.length) return '';
    let html = '<ol>';
    recs.forEach(r => {
      const f    = r.fields || {};
      const name = f['Scope Item Title'] || f['Page Title'] || '';
      const url  = f['URL / Reference link'] || f['Page URL'] || '';
      if (url) {
        html += `<li><a href="${esc(url)}" target="_blank" rel="noopener">${esc(name)}</a></li>`;
      } else if (name) {
        html += `<li>${esc(name)}</li>`;
      }
    });
    return html + '</ol>';
  }

  /* ── Rich text renderer for contact field ────── */
  function renderRichContact(text) {
    if (!text) return '';
    const lines = text.split('\n');
    let html = '';
    let inList = false;

    const convertInline = (line) => {
      return line
        .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,
          (_, label, url) => `<a href="${url}" target="_blank" rel="noopener">${label}</a>`)
        .replace(/\[([^\]]+)\]\((mailto:[^)]+)\)/g,
          (_, label, url) => `<a href="${url}">${label}</a>`)
        .replace(/\*\*(.*?)\*\*/g, '$1')
        .replace(/(?<![/"'>])([\w.+-]+@[\w-]+\.[\w.]+)(?![^<]*<\/a>)/g,
          email => `<a href="mailto:${email}">${email}</a>`);
    };

    lines.forEach(raw => {
      const line = raw.trim();
      if (!line) {
        if (inList) { html += '</ul>'; inList = false; }
        return;
      }
      if (/^[-*•●]\s+/.test(line)) {
        if (!inList) { html += '<ul>'; inList = true; }
        html += `<li>${convertInline(line.replace(/^[-*•●]\s+/, ''))}</li>`;
      } else {
        if (inList) { html += '</ul>'; inList = false; }
        html += `<p class="acr-field-value">${convertInline(line)}</p>`;
      }
    });

    if (inList) html += '</ul>';
    return html;
  }

  /* ── Contact Information renderer ────────────── */
  function renderContact(contactText, leadEval, disabilityRev) {
    let html = '';

    if (contactText) {
      html += renderRichContact(contactText);
    }

    if (leadEval && leadEval.name) {
      html += `<h3 class="eval-block-title">Evaluator${disabilityRev && disabilityRev.name ? 's' : ''}</h3>`;
      html += `<p>Lead Evaluator: ${esc(leadEval.name)}`;
      if (leadEval.jobTitle) html += ` — ${esc(leadEval.jobTitle)}`;
      html += `</p>`;
    }

    if (disabilityRev && disabilityRev.name) {
      if (!leadEval || !leadEval.name) {
        html += `<h3 class="eval-block-title">Evaluators</h3>`;
      }
      html += `<p>Disability Reviewer: ${esc(disabilityRev.name)}`;
      if (disabilityRev.jobTitle) html += ` — ${esc(disabilityRev.jobTitle)}`;
      if (disabilityRev.disability) html += ` (${esc(disabilityRev.disability)})`;
      html += `</p>`;
    }

    return html;
  }

  /* ── Evaluation Methods renderer ─────────────── */
  function renderEvalMethods(methods, assistiveTechs, autoTools) {
    if (!methods.length && !assistiveTechs.length && !autoTools.length) return '';
    let html = '';

    methods.forEach(m => {
      html += `<h3 class="eval-block-title">${esc(m.name)}`;
      if (m.coverage) html += ` <span style="font-weight:400;color:#1a1b1f;">(${esc(m.coverage)})</span>`;
      html += `</h3>`;
      if (m.description) html += `<p>${esc(m.description)}</p>`;
      if (m.tools && m.tools.trim()) {
        html += renderFormattedText(m.tools);
      }
    });

    if (assistiveTechs.length) {
      html += `<h3 class="eval-block-title">Assistive technologies used</h3>`;
      html += `<div class="eval-tags">`;
      assistiveTechs.forEach(t => { html += `<span class="eval-tag">${esc(t)}</span>`; });
      html += `</div>`;
    }

    if (autoTools.length) {
      html += `<h3 class="eval-block-title">Automated tools used</h3>`;
      html += `<div class="eval-tags">`;
      autoTools.forEach(t => { html += `<span class="eval-tag">${esc(t)}</span>`; });
      html += `</div>`;
    }

    return html;
  }

  /* ── Header HTML ─────────────────────────────── */
  const contactHtml   = renderContact(axallContact, leadEvaluator, disabilityReviewer);
  const evalHtml      = renderEvalMethods(methodRecords, assistiveTechnologies, automatedTools);

  // Build evaluation methods intro
  const scopeCount    = scopeRecords.length;
  const shortLabel    = auditData.shortLabel || 'website';
  const scopeItemWord = shortLabel === 'application' ? 'screens'
                      : shortLabel === 'document'    ? 'documents'
                      : shortLabel === 'documents'   ? 'documents'
                      : shortLabel === 'software'    ? 'screens'
                      : 'web pages';

  let specialistText = 'AxAll UAB specialist';
  if (disabilityReviewer && disabilityReviewer.name) {
    const org = disabilityReviewer.organisation
      ? `${disabilityReviewer.organisation} `
      : 'disability community ';
    specialistText = `AxAll UAB and ${org}specialists`;
  }

  const evalIntro = scopeCount > 0
    ? `This conformance report is based on the results of an accessibility evaluation conducted by ${specialistText}, which included a sample of ${scopeCount} ${scopeItemWord}. These ${scopeItemWord} were selected by AxAll UAB as representative of the overall accessibility and functionality of the ${esc(auditTitle)}. The ${scopeItemWord} are listed below in the section "Evaluation scope".`
    : `This conformance report is based on the results of an accessibility evaluation conducted by ${specialistText}.`;

  const headerHtml = `
    ${logoUrl ? `<img class="acr-logo" src="${esc(logoUrl)}" alt="${esc(clientName)} logo" />` : ''}
    <h1 class="acr-title">${esc(auditTitle) ? esc(auditTitle) + ' Accessibility Conformance Report' : 'Accessibility Conformance Report'}</h1>
    ${vpat ? `<p class="acr-edition">${esc(vpat)} Edition</p>` : ''}
    <p class="acr-vpat-version">(Based on VPAT® 2.5 Rev)</p>

    <hr/>

    <h2>Name of Product/Version</h2>
    <p class="acr-field-value">${esc(productName) || '—'}</p>

    <h2>Report Date</h2>
    <p class="acr-field-value">${esc(reportDate) || '—'}</p>

    ${description ? `<h2>Product Description</h2><p class="acr-field-value">${esc(description)}</p>` : ''}

    ${contactHtml ? `<h2>Contact Information</h2>${contactHtml}` : ''}

    ${evalHtml ? `<h2>Evaluation Methods Used</h2><p class="acr-field-value">${evalIntro}</p>${evalHtml}` : ''}

    ${scopeRecords.length ? `<h2>Evaluation Scope</h2>${renderEvalScope(scopeRecords)}` : ''}

    <h2>Applicable Standards/Guidelines</h2>
    ${renderStandards(standard)}
  `;

  document.getElementById('acr-header').innerHTML = headerHtml;

  /* ── Parse ACR records ────────────────────────── */
  const wcagA  = [];
  const wcagAA = [];
  const enByChapter = {};

  records.forEach(r => {
    const f = r.fields;
    const primary     = lookupVal(f['Audit - Criterion ID']);
    const dashIdx     = primary.indexOf('—');
    const criterionId = (dashIdx >= 0 ? primary.slice(dashIdx + 1) : primary).trim();
    const name        = lookupVal(f['Criterion Name']);
    const level       = lookupVal(f['Level']);
    const refUrl      = lookupVal(f['Official Reference URL (from Criterion)']);
    const conformance = lookupVal(f['Conformance Level']);
    const remarks     = lookupVal(f['Remarks and Explanations']);
    const enRef       = lookupVal(f['EN 301 549 Criteria reference']);
    const sectionNotes = lookupVal(f['EN Section Notes Override'])
                      || lookupVal(f['EN Section Notes (from Criterion)']);
    const row = { criterionId, name, level, refUrl, conformance, remarks, enRef, sectionNotes };
    const firstNum = parseFloat(criterionId);
    if (isNaN(firstNum)) return;
    if (firstNum >= 1 && firstNum < 5) {
      if (level === 'A')       wcagA.push(row);
      else if (level === 'AA') wcagAA.push(row);
    } else if (firstNum >= 5 && firstNum <= 13) {
      const ch = Math.floor(firstNum);
      if (!enByChapter[ch]) enByChapter[ch] = [];
      enByChapter[ch].push(row);
    }
  });

  const numSort = (a, b) => a.criterionId.localeCompare(b.criterionId, undefined, { numeric: true });
  wcagA.sort(numSort);
  wcagAA.sort(numSort);
  Object.values(enByChapter).forEach(arr => arr.sort(numSort));

  function renderEnRef(text) {
    if (!text || !text.trim()) return '';
    const lines = text.split('\n').map(l => l.trim()).filter(Boolean)
      .map(l => l.replace(/^[•●\-\*]\s*/, '').trim()).filter(Boolean);
    if (!lines.length) return '';
    return `<span class="acr-en-ref"><em>Also applies to: EN 301 549 Criteria</em><ul>${lines.map(l => `<li>${esc(l)}</li>`).join('')}</ul></span>`;
  }

  function conformanceClass(c) {
    if (c === 'Supports')           return 'acr-conformance-supports';
    if (c === 'Partially Supports') return 'acr-conformance-partial';
    if (c === 'Does Not Support')   return 'acr-conformance-not';
    if (c === 'Not Applicable')     return 'acr-conformance-na';
    return '';
  }

  function renderWcagTable(title, rows, showEnRef) {
    if (!rows.length) return '';
    let html = `
    <table class="acr-table">
      <caption>${title}</caption>
      <thead><tr>
        <th style="width:38%">Criteria</th>
        <th style="width:18%">Conformance Level</th>
        <th style="width:44%">Remarks and Explanations</th>
      </tr></thead><tbody>`;
    rows.forEach(row => {
      const cls = conformanceClass(row.conformance);
      const criterionLink = row.refUrl
        ? `<a href="${esc(row.refUrl)}" target="_blank" rel="noopener"><strong>${esc(row.criterionId)} ${esc(row.name)}</strong></a> (Level ${esc(row.level)})`
        : `<strong>${esc(row.criterionId)} ${esc(row.name)}</strong> (Level ${esc(row.level)})`;
      const enRefHtml = (showEnRef && row.enRef) ? renderEnRef(row.enRef) : '';
      html += `<tr><td>${criterionLink}${enRefHtml}</td><td class="${cls}">${esc(row.conformance)}</td><td>${esc(row.remarks)}</td></tr>`;
    });
    return html + '</tbody></table>';
  }

  function renderEnChapterTable(rows) {
    if (!rows.length) return '';
    let html = `
    <table class="acr-table">
      <thead><tr>
        <th style="width:38%">Criteria</th>
        <th style="width:18%">Conformance Level</th>
        <th style="width:44%">Remarks and Explanations</th>
      </tr></thead><tbody>`;
    rows.forEach(row => {
      const isHeading = row.conformance.includes('Heading cell');
      if (isHeading) {
        html += `<tr class="en-heading-row"><td><strong><em>${esc(row.criterionId)} ${esc(row.name)}</em></strong></td><td>Heading cell – no response required</td><td>Heading cell – no response required</td></tr>`;
      } else {
        const cls = conformanceClass(row.conformance);
        const criterionLabel = row.refUrl
          ? `<a href="${esc(row.refUrl)}" target="_blank" rel="noopener"><strong>${esc(row.criterionId)} ${esc(row.name)}</strong></a>`
          : `<strong>${esc(row.criterionId)} ${esc(row.name)}</strong>`;
        html += `<tr><td>${criterionLabel}</td><td class="${cls}">${esc(row.conformance)}</td><td>${esc(row.remarks)}</td></tr>`;
      }
    });
    return html + '</tbody></table>';
  }

  const EN_BASE = 'https://www.etsi.org/deliver/etsi_en/301500_301599/301549/03.02.01_60/en_301549v030201p.pdf';
  const EN_CHAPTERS = {
    4:  { label: 'Clause 4: Functional Performance Statements', url: `${EN_BASE}#page=20`,
          note: 'Not Applicable. This chapter is informative and does not contain requirements requiring testing. Each aspect of the product\'s functionality under evaluation is described in detail within the technical requirements tables.' },
    5:  { label: 'Clause 5: Generic Requirements',                             url: `${EN_BASE}#page=23` },
    6:  { label: 'Clause 6: ICT with Two-Way Voice Communication',             url: `${EN_BASE}#page=30` },
    7:  { label: 'Clause 7: ICT with Video Capabilities',                      url: `${EN_BASE}#page=35` },
    8:  { label: 'Clause 8: Hardware',                                         url: `${EN_BASE}#page=37` },
    9:  { label: 'Clause 9: Web',                                              url: `${EN_BASE}#page=45` },
    10: { label: 'Clause 10: Non-Web Documents',                               url: `${EN_BASE}#page=52` },
    11: { label: 'Clause 11: Software',                                        url: `${EN_BASE}#page=64` },
    12: { label: 'Clause 12: Documentation and Support Services',              url: `${EN_BASE}#page=84` },
    13: { label: 'Clause 13: ICT Providing Relay or Emergency Service Access', url: `${EN_BASE}#page=86` },
  };

  let body = '';

  body += `
  <hr/>
  <h2>Terms</h2>
  <div class="acr-terms">
    <p>The terms used in the Conformance Level information are defined as follows:</p>
    <ul>
      <li><strong>Supports</strong>: The functionality of the product has at least one method that meets the criterion without known defects or meets with equivalent facilitation.</li>
      <li><strong>Partially Supports</strong>: Some functionality of the product does not meet the criterion.</li>
      <li><strong>Does Not Support</strong>: The majority of product functionality does not meet the criterion.</li>
      <li><strong>Not Applicable</strong>: The criterion is not relevant to the product.</li>
      <li><strong>Not Evaluated</strong>: The product has not been evaluated against the criterion. This can be used only in WCAG 2.0 Level AAA.</li>
    </ul>
    <p class="acr-note"><strong>Note</strong>: In WCAG tables, the conformance level is marked as "Supports" even when the product does not include content covered by the success criterion. This approach aligns with <a href="https://www.w3.org/TR/WCAG20/#conformance-reqs" target="_blank" rel="noopener">WCAG 2.0 Conformance Requirements</a>.</p>
    <p class="acr-note"><strong>Note</strong>: Criteria marked as "Supports" indicate that the product's conformance has been determined through evaluations using the <a href="https://docs.google.com/document/d/18CJrqdVmyEddayMyVPwEBnTAhI2yuDlE/edit#heading=h.vndgi1pz3yrt" target="_blank" rel="noopener">testing methods described above</a>.</p>
    <p class="acr-note"><strong>Note</strong>: In EN 301 549 tables, "Not Applicable" is used in cases where a specific function related to the criterion is not part of the product. For example, if the product is Web, all criteria from Chapter 8: Hardware of EN 301 549 will be marked as "Not Applicable." This aligns with the <a href="https://www.etsi.org/deliver/etsi_en/301500_301599/301549/03.02.01_60/en_301549v030201p.pdf" target="_blank" rel="noopener">EN 301 549 Conformance Requirements</a>.</p>
  </div>
  <hr/>`;

  if (isEN) {
    body += `
    <h2 id="wcag-report">WCAG 2.x Report</h2>
    <p>Tables 1 and 2 document conformance with the following criteria from EN 301 549:</p>
    <ul>
      <li>Clause 9 — Web</li>
      <li>Clauses 10.1–10.4 of Clause 10 — Non-web documents</li>
      <li>Clauses 11.1–11.4 and 11.8.2 of Clause 11 — Software</li>
      <li>Clauses 12.1.2 and 12.2.4 of Clause 12 — Documentation and support services</li>
    </ul>
    <p class="section-note">Note: When reporting on conformance with the WCAG 2.x Success Criteria, they are scoped for full pages, complete processes, and accessibility-supported ways of using technology as documented in the <a href="https://www.w3.org/TR/WCAG20/#conformance-reqs" target="_blank" rel="noopener">WCAG 2.0 Conformance Requirements</a>.</p>`;
  } else {
    body += `
    <h2 id="wcag-report">WCAG 2.x Report</h2>
    <p class="section-note">Note: When reporting on conformance with the WCAG 2.x Success Criteria, they are scoped for full pages, complete processes, and accessibility-supported ways of using technology as documented in the <a href="https://www.w3.org/TR/WCAG20/#conformance-reqs" target="_blank" rel="noopener">WCAG 2.0 Conformance Requirements</a>.</p>`;
  }

  body += renderWcagTable('Table 1: Success Criteria, Level A',  wcagA,  isEN);
  body += renderWcagTable('Table 2: Success Criteria, Level AA', wcagAA, isEN);

  if (isEN) {
    body += `<hr/><h2>EN 301 549 Report</h2>`;
    for (let ch = 4; ch <= 13; ch++) {
      const meta = EN_CHAPTERS[ch];
      if (!meta) continue;
      const rows = enByChapter[ch] || [];
      if (ch === 4) {
        body += `<h3 class="section-heading"><a href="${meta.url}" target="_blank" rel="noopener">${meta.label}</a></h3>`;
        body += `<p class="section-note">Notes: ${meta.note}</p>`;
        continue;
      }
      if (ch === 9) {
        body += `<h3 class="section-heading"><a href="${meta.url}" target="_blank" rel="noopener">${meta.label}</a> (see <a href="#wcag-report">WCAG 2.x section</a>)</h3>`;
        body += `<p class="section-note">See WCAG 2.x section above.</p>`;
        continue;
      }
      const contentRows = rows.filter(r => !r.conformance.includes('Heading cell'));
      const noteRow     = rows.find(r => r.sectionNotes && r.sectionNotes.trim());
      const chapterNote = noteRow ? noteRow.sectionNotes.trim() : '';
      body += `<h3 class="section-heading"><a href="${meta.url}" target="_blank" rel="noopener">${meta.label}</a></h3>`;
      if (chapterNote) body += `<p class="section-note">Notes: ${esc(chapterNote)}</p>`;
      const hasActiveRows = contentRows.some(r => r.conformance !== 'Not Applicable');
      if (hasActiveRows) body += renderEnChapterTable(rows);
    }
  }

  if (legal) {
    body += `<hr/><h2>Legal Disclaimer</h2><p style="white-space:pre-line">${esc(legal)}</p>`;
  }

  document.getElementById('acr-body').innerHTML = body;

})();
</script>
</body>
</html>
